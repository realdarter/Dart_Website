name: Sync PDF editor from pdf-analyzer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/sync-pdf-editor.yml
  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: write

concurrency:
  group: sync-pdf-editor
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4

      - name: Download latest editor page
        run: curl -fL "https://raw.githubusercontent.com/DanNeovi/pdf-analyzer/main/pdf-annotator.html" -o pd.html

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- pd.html; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pd.html
          git commit -m "chore: sync pd.html from DanNeovi/pdf-analyzer"
          git push
